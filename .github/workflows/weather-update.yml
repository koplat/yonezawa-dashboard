name: Update Weather Data

# 米沢の各イベント期間（±1日）の過去気象データを Open-Meteo Historical API から取得し、
# data/events/weather.json を更新する。

on:
  # 毎月1日 00:00 UTC（= 09:00 JST）に実行
  schedule:
    - cron: '0 0 1 * *'
  # 手動実行（GitHub UI の Actions タブから）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch weather data
        run: npm run fetch:weather

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events/weather.json
          if git diff --cached --quiet; then
            echo "No weather data changes."
          else
            git commit -m "chore(weather): update Open-Meteo historical data ($(date -u +%Y-%m-%d))"
            git push
          fi
